description = "Create chapter structure, pacing, foreshadowing plan, and character arc mapping."

prompt = """
# Task: Creative Plan

Your goal is to create a detailed technical and creative plan that defines HOW the story will be told.

## Context
Structural preference (e.g., 3-act, Save the Cat): {{args}}

## Execution Steps

### 1. Read Context
Read `memory/constitution.md` and `stories/[novel-name]/specification.md`.

### 2. Draft the Creative Plan

**1. Structural Approach**
State the chosen narrative structure (e.g., 3-Act, 7-Point, Hero's Journey).

**2. Chapter Breakdown**
A high-level outline of each chapter or story arc — what happens, what the goal of each chapter is.

**3. Pacing & Tension**
- Where are the high-tension action moments?
- Where are the quiet, reflective scenes?
- Read the pacing preference from `memory/constitution.md` (Chapter 4: Pacing Strategy).
- Apply that pacing archetype to the chapter breakdown.
- Assign a **pacing tag** to every chapter: `[Action]`, `[Reflection]`, `[Transition]`, `[Climax]`, `[Breather]`, `[Setup]`.
- If pacing preference is "Balanced", ensure at least 1 reflection/breather chapter for every 2-3 action chapters.
- If pacing preference is "Relentless Action", acknowledge but still recommend at least one brief cooldown per arc.

**4. Foreshadowing Plan**
What elements need to be set up early for later payoffs?

**5. Character Arc Mapping**
How do the main characters change over the course of the planned chapters?

### 3. Save
Save the plan to `stories/[novel-name]/creative-plan.md`.

### 4. Post-Plan: Initialize Tracking Folder
After saving the creative plan, immediately do the following:

1. Create the directory `stories/[novel-name]/tracking/` if it does not exist.
2. Initialize these 5 files from their templates — replacing `[Novel Name]` and other top-level placeholders with actual values from the specification and constitution:
   - `templates/tracking/character-state.json` → `stories/[novel-name]/tracking/character-state.json`
   - `templates/tracking/plot-tracker.json` → `stories/[novel-name]/tracking/plot-tracker.json`
   - `templates/tracking/relationships.json` → `stories/[novel-name]/tracking/relationships.json`
   - `templates/tracking/timeline.json` → `stories/[novel-name]/tracking/timeline.json`
   - `templates/tracking/validation-rules.json` → `stories/[novel-name]/tracking/validation-rules.json`
3. In `character-state.json`: populate the protagonist's name and any major supporting characters already defined in `knowledge/characters.md`.
4. In `plot-tracker.json`: populate the main plot name and first chapter's expected story state from the creative plan.
5. In `validation-rules.json`: populate the protagonist's name, aliases, and any known forbidden terms for that character.
6. Tell the user: "Tracking folder initialized at `stories/[novel-name]/tracking/`. These JSON files will be updated by the Write agent after each chapter and cross-checked by the Analyze agent."

### 5. Next Step
Tell the user to run `/novel:tasks` next.
"""
